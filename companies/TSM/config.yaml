# Tracked metrics define what appears in the key metrics card and comparison tables.
# section_pattern: regex to match the section title in the MD file
# item_pattern: regex to match the specific item within that section
# comparison: how to compare across quarters (midpoint_pct, midpoint_delta, text_diff)
tracked_metrics:
  guidance_for:
    label: "Guidance For"
    section_pattern: "^Quarterly Guidance"
    extract: "section_suffix"  # Extract the parenthetical from section title
    display: "banner"          # Full-width banner style

  revenue:
    label: "Next-Q Revenue"
    section_pattern: "^Quarterly Guidance"
    item_pattern: "^\\*\\*Revenue:?\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"  # $XB...$YB

  gm:
    label: "Next-Q Gross Margin"
    section_pattern: "^Quarterly Guidance"
    item_pattern: "^\\*\\*Gross Margin:?\\*\\*"
    comparison: "midpoint_delta"
    midpoint_format: "percentage"  # X%...Y%

  om:
    label: "Next-Q Operating Margin"
    section_pattern: "^Quarterly Guidance"
    item_pattern: "^\\*\\*Operating Margin:?\\*\\*"
    comparison: "midpoint_delta"
    midpoint_format: "percentage"

  fy_revenue:
    label: "FY Revenue Growth"
    section_pattern: "^Full Year.*Guidance"
    item_pattern: "^\\*\\*Revenue( growth)?:?\\*\\*"
    comparison: "text_diff"

  capex:
    label: "CapEx"
    section_pattern: "^Full Year.*Guidance"
    item_pattern: "^\\*\\*CapEx:?\\*\\*"
    comparison: "text_diff"

  lt_gm:
    label: "LT Gross Margin Target"
    section_pattern: "^Long-Term"
    item_pattern: "^\\*\\*Gross Margin:?\\*\\*"
    comparison: "text_diff"

  lt_cagr:
    label: "LT Revenue CAGR"
    section_pattern: "^Long-Term"
    item_pattern: "^\\*\\*Revenue CAGR:?\\*\\*"
    comparison: "text_diff"

  ai_cagr:
    label: "AI Revenue CAGR"
    section_pattern: "(?i)(ai|full year.*guidance)"
    item_pattern: "(?i)ai.*(revenue cagr|accelerator revenue cagr)"
    comparison: "text_diff"

  ai_share:
    label: "AI Revenue Share"
    section_pattern: "(?i)ai"
    item_pattern: "(?i)ai revenue share"
    comparison: "text_diff"

# Change detection: patterns for new section detection (generic approach)
# If a section title matches any of these patterns and didn't exist in the prior quarter,
# it's flagged as "NEW" in the What Changed box.
new_section_keywords:
  - pattern: "(?i)a16"
    label: "A16 technology first disclosed"
  - pattern: "(?i)tariff"
    label: "Tariff impact discussion added"
  - pattern: "(?i)(ai demand|ai / generative ai)"
    label: "AI demand emerges as a discussion theme"
    first_only: true  # Only flag the very first appearance, not reappearances
    max_quarter_idx: 4  # Only consider as "new" within first 5 quarters
  - pattern: "(?i)actuals"
    label: "Full-year actuals reported this quarter"
  - pattern: "(?i)electricity"
    label: "Electricity cost impact quantified"
  - pattern: "(?i)power supply"
    label: "Power supply assessment added"
  - pattern: "(?i)four growth"
    label: "Four Growth Platforms framework introduced"

# Comparison page configuration
comparison_sections:
  - title: "Quarterly Revenue Guidance"
    metric_key: "revenue"
    columns: ["Quarter", "Revenue Guidance", "Midpoint", "vs Prior"]

  - title: "Quarterly Gross Margin Guidance"
    metric_key: "gm"
    columns: ["Quarter", "GM Guidance", "Midpoint", "vs Prior"]

  - title: "Full Year Revenue Guidance"
    metric_key: "fy_revenue"
    columns: ["Quarter", "FY Revenue Guidance"]

  - title: "CapEx Guidance"
    metric_key: "capex"
    columns: ["Quarter", "CapEx Guidance"]

  - title: "Long-Term Targets"
    metrics: ["lt_gm", "lt_cagr"]
    columns: ["Quarter", "LT GM Target", "LT Revenue CAGR"]

  - title: "AI Metrics"
    metrics: ["ai_cagr", "ai_share"]
    columns: ["Quarter", "AI Revenue CAGR", "AI Revenue Share"]

# Extraction context: domain-specific hints for Claude during extraction
extraction_context: |
  TSMC is a semiconductor foundry. Key domain knowledge:
  - Node naming: smaller number = more advanced (e.g., 3nm > 5nm > 7nm)
  - Revenue is reported in both TWD (Taiwan Dollars) and USD
  - "Wafer revenue" refers to revenue broken down by process technology node
  - GM = Gross Margin, OM = Operating Margin
  - CapEx is typically guided as a range in USD billions
  - CoWoS = Chip-on-Wafer-on-Substrate (advanced packaging)
  - SoIC = System on Integrated Chips (3D stacking)
  - HPC = High Performance Computing
  - DCE = Digital Consumer Electronics
  - "Foundry 2.0" is TSMC's expanded definition of the foundry market
  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)
  - Q4 earnings calls typically include full-year actuals
  - FX impact: TWD weakening vs USD is positive for margins

topic_hints:
  - "Technology nodes and roadmap (N3, N2, A16)"
  - "Advanced packaging (CoWoS, SoIC)"
  - "Overseas fab expansion (Arizona, Japan, Germany)"
  - "AI demand and revenue mix"
  - "Gross margin trajectory and dilution factors"
  - "CapEx and capacity plans"
  - "Platform revenue breakdown (HPC, Smartphone, IoT, Auto, DCE)"
  - "Pricing strategy and value-selling"
