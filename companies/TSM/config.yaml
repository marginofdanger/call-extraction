    label: Next-Q Revenue
    section_pattern: ^Quarterly Guidance
    item_pattern: ^\*\*Revenue:?\*\*
    comparison: midpoint_pct
    midpoint_format: dollar_billions
  gm:
    label: Next-Q Gross Margin
    section_pattern: ^Quarterly Guidance
    item_pattern: ^\*\*Gross Margin:?\*\*
    comparison: midpoint_delta
    midpoint_format: percentage
  om:
    label: Next-Q Operating Margin
    section_pattern: ^Quarterly Guidance
    item_pattern: ^\*\*Operating Margin:?\*\*
    comparison: midpoint_delta
    midpoint_format: percentage
  fy_revenue:
    label: FY Revenue Growth
    section_pattern: ^Full Year.*Guidance
    item_pattern: ^\*\*Revenue( growth)?:?\*\*
    comparison: text_diff
  capex:
    label: CapEx
    section_pattern: ^Full Year.*Guidance
    item_pattern: ^\*\*CapEx:?\*\*
    comparison: text_diff
  lt_gm:
    label: LT Gross Margin Target
    section_pattern: ^Long-Term
    item_pattern: ^\*\*Gross Margin:?\*\*
    comparison: text_diff
  lt_cagr:
    label: LT Revenue CAGR
    section_pattern: ^Long-Term
    item_pattern: ^\*\*Revenue CAGR:?\*\*
