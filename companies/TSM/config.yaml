extraction_context: 'TSMC is a semiconductor foundry. Key domain knowledge:

  - Node naming: smaller number = more advanced (e.g., 3nm > 5nm > 7nm)

  - Revenue is reported in both TWD (Taiwan Dollars) and USD

  - "Wafer revenue" refers to revenue broken down by process technology node

  - GM = Gross Margin, OM = Operating Margin

  - CapEx is typically guided as a range in USD billions

  - CoWoS = Chip-on-Wafer-on-Substrate (advanced packaging)

  - SoIC = System on Integrated Chips (3D stacking)

  - HPC = High Performance Computing

  - DCE = Digital Consumer Electronics

  - "Foundry 2.0" is TSMC''s expanded definition of the foundry market

  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)

  - Q4 earnings calls typically include full-year actuals

  - FX impact: TWD weakening vs USD is positive for margins

  '
topic_hints:
- Technology nodes and roadmap (N3, N2, A16)
- Advanced packaging (CoWoS, SoIC)
- Overseas fab expansion (Arizona, Japan, Germany)
- AI demand and revenue mix
- Gross margin trajectory and dilution factors
- CapEx and capacity plans
- Platform revenue breakdown (HPC, Smartphone, IoT, Auto, DCE)
- Pricing strategy and value-selling
