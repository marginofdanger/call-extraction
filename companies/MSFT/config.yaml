tracked_metrics:
  guidance_for:
    label: "Guidance For"
    section_pattern: "^Quarterly Guidance"
    extract: "section_suffix"
    display: "banner"

  revenue:
    label: "Total Revenue"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Total )?Revenue:?\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"

  intelligent_cloud_revenue:
    label: "Intelligent Cloud Revenue"
    section_pattern: "(?i)(quarterly guidance|segment|intelligent cloud)"
    item_pattern: "(?i)^\\*\\*Intelligent Cloud Revenue:?\\*\\*"
    comparison: "text_diff"

  azure_growth:
    label: "Azure Revenue Growth"
    section_pattern: "(?i)(quarterly guidance|segment|intelligent cloud|azure)"
    item_pattern: "(?i)^\\*\\*Azure( and Other Cloud Services)?( Revenue)? Growth:?\\*\\*"
    comparison: "text_diff"

  productivity_revenue:
    label: "Productivity & Business Revenue"
    section_pattern: "(?i)(quarterly guidance|segment|productivity)"
    item_pattern: "(?i)^\\*\\*Productivity (& |and )Business Processes Revenue:?\\*\\*"
    comparison: "text_diff"

  more_personal_computing_revenue:
    label: "More Personal Computing Revenue"
    section_pattern: "(?i)(quarterly guidance|segment|personal computing)"
    item_pattern: "(?i)^\\*\\*More Personal Computing Revenue:?\\*\\*"
    comparison: "text_diff"

  operating_income:
    label: "Operating Income"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*Operating Income:?\\*\\*"
    comparison: "text_diff"

  eps:
    label: "EPS (Diluted)"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Diluted )?EPS:?\\*\\*"
    comparison: "text_diff"

  capex:
    label: "Capital Expenditures"
    section_pattern: "(?i)(quarterly guidance|full year|capex|capital)"
    item_pattern: "(?i)^\\*\\*Cap(ital )?Ex(penditures)?:?\\*\\*"
    comparison: "text_diff"

  cloud_gross_margin:
    label: "Cloud Gross Margin"
    section_pattern: "(?i)(quarterly guidance|key metrics|cloud|margin)"
    item_pattern: "(?i)^\\*\\*(Microsoft )?Cloud Gross Margin:?\\*\\*"
    comparison: "midpoint_delta"
    midpoint_format: "percentage"

new_section_keywords:
  - pattern: "(?i)copilot"
    label: "Copilot AI product discussed"
    first_only: true
    max_quarter_idx: 4
  - pattern: "(?i)openai"
    label: "OpenAI partnership discussed"
  - pattern: "(?i)activision"
    label: "Activision Blizzard acquisition impact discussed"
  - pattern: "(?i)actuals"
    label: "Full-year actuals reported this quarter"
  - pattern: "(?i)ai infrastructure|ai capex"
    label: "AI infrastructure investment discussed"
  - pattern: "(?i)gaming"
    label: "Gaming segment discussed"

comparison_sections:
  - title: "Revenue Guidance"
    metric_key: "revenue"
    columns: ["Quarter", "Revenue Guidance", "Midpoint", "vs Prior"]

  - title: "Segment Revenue"
    metrics: ["intelligent_cloud_revenue", "productivity_revenue", "more_personal_computing_revenue"]
    columns: ["Quarter", "Intelligent Cloud", "Productivity & BP", "More Personal Computing"]

  - title: "Azure & Cloud"
    metrics: ["azure_growth", "cloud_gross_margin"]
    columns: ["Quarter", "Azure Growth", "Cloud GM"]

  - title: "Profitability & CapEx"
    metrics: ["operating_income", "eps", "capex"]
    columns: ["Quarter", "Operating Income", "EPS", "CapEx"]

extraction_context: |
  Microsoft is one of the world's largest technology companies, operating across cloud, productivity software, gaming, and AI. Key domain knowledge:
  - Three reporting segments:
    1. Intelligent Cloud: Azure, SQL Server, Windows Server, Enterprise Services, GitHub, Nuance
    2. Productivity & Business Processes: Office 365, LinkedIn, Dynamics 365
    3. More Personal Computing: Windows, Gaming (Xbox, Activision), Search/advertising, Surface, devices
  - Azure = Microsoft's cloud platform (IaaS, PaaS); growth reported as % YoY in constant currency
  - "Azure and other cloud services" is the exact line item (includes Azure, SQL, other cloud)
  - "Microsoft Cloud" = Azure + Office 365 Commercial + Dynamics 365 + LinkedIn + other cloud
  - Microsoft Cloud revenue and gross margin are key metrics across all segments
  - Copilot = AI assistant integrated across Microsoft 365, GitHub, Azure, etc.
  - OpenAI partnership = Microsoft's major AI investment (exclusive cloud provider)
  - Activision Blizzard = acquired October 2023 for ~$69B (impacts Gaming segment)
  - CapEx = massive and growing, driven by AI datacenter infrastructure
  - LinkedIn revenue is reported within Productivity & Business Processes
  - Search and news advertising revenue includes Bing and Edge
  - "Constant currency" growth removes FX impact for cleaner YoY comparisons
  - Microsoft guides segment revenue ranges and operating metrics for next quarter
  - Fiscal year ends June 30 (FY2026 = Jul 2025 – Jun 2026)
  - Q4 (Apr-Jun) earnings calls include full-year actuals

topic_hints:
  - "Azure revenue growth rate and AI contribution to Azure growth"
  - "Microsoft Cloud revenue and gross margin trajectory"
  - "Copilot adoption, monetization, and seat growth"
  - "AI infrastructure CapEx and datacenter expansion"
  - "OpenAI partnership and AI model integration"
  - "Office 365 / Microsoft 365 commercial seat growth and ARPU"
  - "Gaming segment and Activision integration"
  - "LinkedIn revenue growth"
  - "Dynamics 365 and business applications growth"
  - "Segment-level operating income and margin trends"
