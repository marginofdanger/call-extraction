extraction_context: 'Meta Platforms (formerly Facebook) is the world''s largest social
  media company, operating

  Facebook, Instagram, WhatsApp, Messenger, and Threads (the "Family of Apps"), plus

  Reality Labs (VR/AR hardware and metaverse).


  Key domain knowledge:

  - Two reporting segments: Family of Apps (FoA) and Reality Labs (RL)

  - Family of Apps generates virtually all profit; Reality Labs operates at a large
  loss

  - DAP = Daily Active People across the family of apps (Facebook, Instagram, WhatsApp,
  Messenger)

  - MAP = Monthly Active People across the family

  - ARPP = Average Revenue Per Person (family-level metric, replacing older Facebook-only
  ARPU)

  - Ad revenue is ~97%+ of total revenue; driven by impressions x price per ad

  - Ad impressions growth comes from more users and more ad load/surfaces

  - Average price per ad reflects advertiser demand and ad relevance/targeting quality

  - "Year of Efficiency" (2023) was a major cost-cutting/restructuring initiative

  - Headcount reductions in 2022-2023 were significant (from ~87K to ~67K)

  - Reality Labs losses have been $3-5B+ per quarter; management committed to continued
  investment

  - CapEx is a critical metric — driven by AI infrastructure (data centers, GPUs)

  - Meta AI and Llama (open-source LLM) are key AI initiatives

  - Threads launched July 2023 as a competitor to X (formerly Twitter)

  - WhatsApp monetization (Business messaging, Click-to-Message ads) is a growth driver

  - Reels (short-form video) monetization efficiency has been a multi-year focus

  - FX headwinds/tailwinds are often material given ~50%+ international revenue

  - Share repurchases have been very large ($30B+ annually in recent years)

  - Meta guides on next-quarter revenue and full-year CapEx/expenses

  '
topic_hints:
- Family of Apps vs Reality Labs segment performance
- Ad impressions and average price per ad trends
- DAP/MAP engagement metrics and ARPP growth
- AI infrastructure investment and CapEx outlook
- Reels monetization efficiency progress
- WhatsApp/Business messaging monetization
- Headcount and operating expense management
- Reality Labs losses and metaverse strategy
- Meta AI, Llama model development, and AI product integration
- Share repurchases and capital return
- Regulatory environment (antitrust, privacy, content moderation)
- FX impact on revenue
