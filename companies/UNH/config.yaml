extraction_context: 'UnitedHealth Group is the largest U.S. health insurer and healthcare
  services company, operating through two main platforms: UnitedHealthcare (insurance)
  and Optum (health services). Key domain knowledge:

  - MCR = Medical Care Ratio (medical costs / premiums; lower is better for insurer)

  - UHC = UnitedHealthcare (health benefits / insurance segment)

  - Optum has three sub-segments: OptumHealth (care delivery), OptumInsight (analytics/tech),
  OptumRx (PBM)

  - PBM = Pharmacy Benefit Manager (OptumRx manages drug benefits)

  - Medicare Advantage = private Medicare plans (government-funded, key growth driver)

  - Star Ratings = CMS quality scores that affect Medicare bonus payments

  - "Medical cost trend" = rate of increase in per-member medical costs

  - "Days claims payable" = reserves measured in days of claims expense

  - Value-based care = providers paid for outcomes rather than volume

  - Change Healthcare = acquired health IT company (cyberattack in Feb 2024)

  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)

  - Q4 earnings calls typically include full-year actuals and next-year guidance

  - Adjusted EPS excludes amortization of intangibles and other non-recurring items

  - Medicare Advantage enrollment/rate cycles are key seasonal drivers

  '
topic_hints:
- Medical care ratio trends and medical cost outlook
- Medicare Advantage enrollment and rate updates
- Optum segment performance (Health, Insight, Rx)
- Adjusted EPS and full-year guidance
- Value-based care expansion and patient engagement
- PBM / OptumRx market dynamics and drug cost trends
- Star Ratings impact on Medicare bonus payments
- Change Healthcare recovery and integration
- Capital allocation (dividends, buybacks, M&A)
- Regulatory and policy environment (IRA, prior auth rules)
