extraction_context: "Progressive is one of the largest U.S. auto and property insurers.\
  \ Key domain knowledge:\n- Combined ratio = loss ratio + expense ratio (below 100%\
  \ = underwriting profit)\n- Loss ratio = incurred losses / earned premiums (claims\
  \ cost relative to premiums)\n- LAE = Loss Adjustment Expense (cost to settle claims)\n\
  - Expense ratio = underwriting expenses / earned premiums\n- NPW = Net Premiums\
  \ Written (premiums after reinsurance)\n- NEP = Net Premiums Earned (recognized\
  \ over the policy period)\n- PIF = Policies in Force (number of active policies)\n\
  - \"Personal Lines\" = Personal Auto + Special Lines (motorcycle, boat, RV)\n- \"\
  Commercial Lines\" = Commercial Auto (for-hire, business auto)\n- \"Property\" =\
  \ Homeowners, renters, condo, flood insurance\n- Snapshot = Progressive's usage-based\
  \ insurance / telematics program\n- \"Calendar year\" vs \"accident year\" combined\
  \ ratio — accident year excludes prior year reserve development\n- Rate increases\
  \ = price changes filed with state regulators\n- Severity = average cost per claim;\
  \ Frequency = claims per policy\n- Progressive reports monthly results (unique among\
  \ insurers)\n- Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)\n- Q4 typically\
  \ includes full-year actuals\n- PGR does not hold traditional quarterly earnings\
  \ calls like most companies;\n  they release monthly and quarterly financial results\
  \ with a shareholder letter\n"
topic_hints:
- Combined ratio by segment (Personal Auto, Commercial, Property)
- Rate increases and pricing adequacy
- Policies in force growth and market share gains
- 'Loss trends: severity, frequency, and inflation impact'
- Catastrophe losses and property segment performance
- Expense ratio and operational efficiency
- Snapshot / telematics and usage-based insurance
- Investment portfolio and recurring investment income
- Commercial auto growth and profitability
