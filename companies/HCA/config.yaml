    label: Adj. EBITDA Margin
    section_pattern: (?i)^Q\d.*Actuals|^Quarterly Results
    item_pattern: (?i)^\*\*Adjusted EBITDA [Mm]argin[^*]*\*\*
    comparison: text_diff
