extraction_context: "HCA Healthcare is the largest for-profit hospital operator in\
  \ the United States,\noperating ~180+ hospitals and ~2,000+ ambulatory sites of\
  \ care across 20 states and the UK.\n\nKey domain knowledge:\n- \"Same-facility\"\
  \ or \"same-store\" metrics exclude recently acquired/divested facilities and\n\
  \  are the most important comparison basis (like same-store sales in retail)\n-\
  \ Equivalent admissions = admissions adjusted for outpatient activity (converts\
  \ outpatient\n  revenue to inpatient-equivalent volume)\n- Revenue per equivalent\
  \ admission (Rev/EA) is the key revenue intensity metric\n- Payer mix: Managed Care\
  \ (commercial insurance), Medicare, Medicaid, Uninsured/Self-pay\n- Managed care\
  \ is highest-margin payer; Medicaid is lowest; uninsured is a net cost\n- EBITDA\
  \ = Earnings Before Interest, Taxes, Depreciation, and Amortization\n- \"Adjusted\
  \ EBITDA\" excludes one-time items (gains/losses on sales, legal settlements, etc.)\n\
  - SWB = Salaries, Wages, and Benefits (largest cost line, typically ~45-48% of revenue)\n\
  - Supply costs typically ~15-17% of revenue\n- \"Contract labor\" = temporary/agency\
  \ nurses — a key cost pressure indicator\n- HCA guides on: revenue, adjusted EBITDA,\
  \ diluted EPS, and CapEx for the full year\n- Q4 calls typically include full-year\
  \ actuals and initial next-year guidance\n- HCA operates in 3 segments historically\
  \ but reports as one operating segment\n- Share repurchases are a major capital\
  \ return mechanism\n- Acuity = severity/complexity of cases; higher acuity = higher\
  \ revenue per admission\n- Observation patients count differently from inpatient\
  \ admissions for reporting\n"
topic_hints:
- Same-facility admissions and equivalent admissions trends
- Revenue per equivalent admission growth and payer mix shifts
- Labor costs, contract labor usage, and staffing trends
- Adjusted EBITDA margin trajectory
- Full-year guidance updates (revenue, EBITDA, EPS, CapEx)
- 'Payer mix: managed care vs Medicare vs Medicaid vs uninsured'
- Medicaid redetermination / expansion impacts
- 'Capital deployment: CapEx, acquisitions, share repurchases'
- Outpatient vs inpatient volume mix
- Acuity trends and surgical volume
