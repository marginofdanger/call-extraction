# Tracked metrics: what appears in the key metrics card and comparison tables.
# Hospital-specific KPIs centered on volume, revenue intensity, and margins.
tracked_metrics:
  # --- Forward Guidance ---
  fy_revenue_guidance:
    label: "FY Revenue Guidance"
    section_pattern: "(?i)^Full Year.*Guidance|^20\\d{2} Guidance"
    item_pattern: "(?i)^\\*\\*Revenue[^*]*\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"

  fy_ebitda_guidance:
    label: "FY Adj. EBITDA Guidance"
    section_pattern: "(?i)^Full Year.*Guidance|^20\\d{2} Guidance"
    item_pattern: "(?i)^\\*\\*Adjusted EBITDA[^*]*\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"

  fy_eps_guidance:
    label: "FY Diluted EPS Guidance"
    section_pattern: "(?i)^Full Year.*Guidance|^20\\d{2} Guidance"
    item_pattern: "(?i)^\\*\\*(Diluted )?EPS[^*]*\\*\\*"
    comparison: "text_diff"

  capex:
    label: "CapEx Guidance"
    section_pattern: "(?i)^Full Year.*Guidance|^20\\d{2} Guidance|^Capital"
    item_pattern: "(?i)^\\*\\*(Cap[Ee]x|Capital [Ee]xpenditure)[^*]*\\*\\*"
    comparison: "text_diff"

  # --- Key Operational Metrics ---
  same_facility_admissions:
    label: "Same-Facility Admissions"
    section_pattern: "(?i)^Q\\d.*Actuals|same.?facility|volume"
    item_pattern: "(?i)^\\*\\*(Same[- ]?facility )?(Equivalent )?[Aa]dmissions[^*]*\\*\\*"
    comparison: "text_diff"

  same_facility_revenue_growth:
    label: "Revenue Per Admission"
    section_pattern: "(?i)^Q\\d.*Actuals|same.?facility|revenue"
    item_pattern: "(?i)^\\*\\*(Same[- ]?facility )?(Net )?[Rr]evenue[^*]*admission[^*]*\\*\\*"
    comparison: "text_diff"

  adjusted_ebitda_margin:
    label: "Adj. EBITDA Margin"
    section_pattern: "(?i)^Q\\d.*Actuals|^Quarterly Results"
    item_pattern: "(?i)^\\*\\*Adjusted EBITDA [Mm]argin[^*]*\\*\\*"
    comparison: "text_diff"

# Change detection for new section topics
new_section_keywords:
  - pattern: "(?i)labor|staffing|workforce"
    label: "Labor/staffing discussion added"
  - pattern: "(?i)medicaid.*(redetermination|unwind)"
    label: "Medicaid redetermination impact discussed"
  - pattern: "(?i)hurricane|disaster|storm"
    label: "Natural disaster impact discussed"
  - pattern: "(?i)cyber|breach|security incident"
    label: "Cybersecurity incident discussed"
  - pattern: "(?i)acquisition|M&A|deal"
    label: "M&A/acquisition discussion added"

# Comparison page configuration — guidance first, then operational metrics
comparison_sections:
  - title: "Full Year Revenue Guidance"
    metric_key: "fy_revenue_guidance"
    columns: ["Quarter", "FY Revenue Range", "Midpoint", "vs Prior"]

  - title: "Full Year EBITDA Guidance"
    metric_key: "fy_ebitda_guidance"
    columns: ["Quarter", "FY EBITDA Range", "Midpoint", "vs Prior"]

  - title: "Full Year EPS & CapEx Guidance"
    metrics: ["fy_eps_guidance", "capex"]
    columns: ["Quarter", "FY EPS Guidance", "CapEx Guidance"]

  - title: "Same-Facility Volume & Revenue Intensity"
    metrics: ["same_facility_admissions", "same_facility_revenue_growth"]
    columns: ["Quarter", "Admissions Growth", "Rev/Admission Growth"]

  - title: "EBITDA Margin Trends"
    metric_key: "adjusted_ebitda_margin"
    columns: ["Quarter", "Adj. EBITDA Margin"]

# Extraction context: domain-specific hints for Claude during extraction
extraction_context: |
  HCA Healthcare is the largest for-profit hospital operator in the United States,
  operating ~180+ hospitals and ~2,000+ ambulatory sites of care across 20 states and the UK.

  Key domain knowledge:
  - "Same-facility" or "same-store" metrics exclude recently acquired/divested facilities and
    are the most important comparison basis (like same-store sales in retail)
  - Equivalent admissions = admissions adjusted for outpatient activity (converts outpatient
    revenue to inpatient-equivalent volume)
  - Revenue per equivalent admission (Rev/EA) is the key revenue intensity metric
  - Payer mix: Managed Care (commercial insurance), Medicare, Medicaid, Uninsured/Self-pay
  - Managed care is highest-margin payer; Medicaid is lowest; uninsured is a net cost
  - EBITDA = Earnings Before Interest, Taxes, Depreciation, and Amortization
  - "Adjusted EBITDA" excludes one-time items (gains/losses on sales, legal settlements, etc.)
  - SWB = Salaries, Wages, and Benefits (largest cost line, typically ~45-48% of revenue)
  - Supply costs typically ~15-17% of revenue
  - "Contract labor" = temporary/agency nurses — a key cost pressure indicator
  - HCA guides on: revenue, adjusted EBITDA, diluted EPS, and CapEx for the full year
  - Q4 calls typically include full-year actuals and initial next-year guidance
  - HCA operates in 3 segments historically but reports as one operating segment
  - Share repurchases are a major capital return mechanism
  - Acuity = severity/complexity of cases; higher acuity = higher revenue per admission
  - Observation patients count differently from inpatient admissions for reporting

topic_hints:
  - "Same-facility admissions and equivalent admissions trends"
  - "Revenue per equivalent admission growth and payer mix shifts"
  - "Labor costs, contract labor usage, and staffing trends"
  - "Adjusted EBITDA margin trajectory"
  - "Full-year guidance updates (revenue, EBITDA, EPS, CapEx)"
  - "Payer mix: managed care vs Medicare vs Medicaid vs uninsured"
  - "Medicaid redetermination / expansion impacts"
  - "Capital deployment: CapEx, acquisitions, share repurchases"
  - "Outpatient vs inpatient volume mix"
  - "Acuity trends and surgical volume"
