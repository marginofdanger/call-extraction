extraction_context: 'Broadcom is a diversified technology company with two main segments:

  1. Semiconductor Solutions (~60% of revenue): networking, broadband, server storage/connectivity,
  wireless, industrial

  2. Infrastructure Software (~40% of revenue): VMware, CA Technologies, Symantec
  Enterprise Security


  Key domain knowledge:

  - VMware acquisition closed November 22, 2023 (during FQ1 FY2024). Pre-acquisition
  quarters won''t have VMware revenue.

  - Broadcom is transitioning VMware from perpetual licenses to subscriptions (VCF
  — VMware Cloud Foundation)

  - Adjusted EBITDA is the primary profitability metric (not GAAP operating income)

  - AI revenue is primarily from: custom AI accelerators (XPUs for hyperscalers) and
  networking ASICs

  - Key networking products: Tomahawk switches (data center), Jericho (service provider),
  custom XPUs

  - Key AI product lines: custom XPUs (for Google TPU, Meta MTIA, ByteDance, etc.),
  networking ASICs, NICs

  - "Serviceable Addressable Market" (SAM) is frequently referenced for AI

  - Fiscal year is offset: ends first Sunday after Nov 2. FQ1=Nov-Jan, FQ2=Feb-Apr,
  FQ3=May-Jul, FQ4=Aug-Oct

  - FQ4 earnings calls typically include full-year actuals

  - Revenue is typically guided as a single-point estimate, with Adj. EBITDA as %
  of projected revenue

  - Post-VMware, they report "annualized booking value" (ABV) for software

  - 10:1 stock split occurred July 2024

  - Pre-VMware, Infrastructure Software segment was much smaller (CA + Symantec +
  Brocade)

  - GM = Gross Margin, OM = Operating Margin (less commonly guided than Adj. EBITDA)

  '
topic_hints:
- AI revenue and custom accelerator (XPU) demand from hyperscalers
- VMware integration progress and subscription transition (VCF)
- Semiconductor Solutions segment breakdown (networking, broadband, storage, wireless,
  industrial)
- Infrastructure Software revenue and margin trajectory
- Adjusted EBITDA and margin targets
- Networking revenue (Ethernet switching, NICs, custom silicon for AI clusters)
- Capital allocation (buybacks, dividends, debt paydown post-VMware)
- AI serviceable addressable market (SAM) sizing
- Free cash flow generation and leverage ratio targets
- Customer concentration and hyperscaler relationships (Google, Meta, ByteDance)
