tracked_metrics:
  guidance_for:
    label: Guidance For
    section_pattern: ^Quarterly Guidance
    extract: section_suffix
    display: banner
  revenue:
    label: Next-Q Revenue
    section_pattern: ^Quarterly Guidance
    item_pattern: ^\*\*Revenue:?\*\*
    comparison: midpoint_pct
    midpoint_format: dollar_billions
  adj_ebitda_pct:
    label: Next-Q Adj. EBITDA % of Rev
    section_pattern: ^Quarterly Guidance
    item_pattern: (?i)^\*\*Adjusted EBITDA.*(%|percent|of revenue)
    comparison: midpoint_delta
    midpoint_format: percentage
  semi_revenue:
    label: Semiconductor Revenue
    section_pattern: (?i)(quarterly guidance|semiconductor|segment)
    item_pattern: (?i)^\*\*Semiconductor (Solutions )?Revenue:?\*\*
    comparison: text_diff
  sw_revenue:
    label: Infrastructure Software Revenue
    section_pattern: (?i)(quarterly guidance|infrastructure software|segment|vmware)
    item_pattern: (?i)^\*\*(Infrastructure )?Software Revenue:?\*\*
    comparison: text_diff
  ai_revenue:
    label: AI Revenue
    section_pattern: (?i)(ai|artificial intelligence|networking|actuals)
    item_pattern: (?i)^\*\*AI Revenue:?\*\*
    comparison: text_diff
  fy_revenue:
    label: FY Revenue
    section_pattern: ^Full Year.*Guidance
    item_pattern: ^\*\*Revenue:?\*\*
    comparison: text_diff
  capex:
    label: CapEx
    section_pattern: (?i)(full year.*guidance|quarterly guidance|capex|capital)
    item_pattern: (?i)^\*\*CapEx:?\*\*
    comparison: text_diff
  fcf:
    label: Free Cash Flow
    section_pattern: (?i)(full year|free cash flow|capital)
    item_pattern: (?i)^\*\*Free Cash Flow:?\*\*
    comparison: text_diff
  vmware_integration:
    label: VMware Integration
    section_pattern: (?i)vmware
    item_pattern: (?i)(annualized booking|integration|vmware revenue)
    comparison: text_diff
