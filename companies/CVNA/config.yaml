extraction_context: 'Carvana is an online used car retailer and e-commerce platform.
  Key domain knowledge:

  - GPU = Gross Profit per Unit (the central unit economics metric)

  - Total GPU includes retail vehicle GPU + wholesale GPU + finance GPU + ancillary
  GPU

  - SGA = Selling, General & Administrative expenses (per unit shows leverage)

  - Retail units = vehicles sold directly to consumers via carvana.com

  - Wholesale units = vehicles sold through wholesale channels (ADESA auctions)

  - ADESA = wholesale auto auction business acquired in 2022

  - IRC = Inspection and Reconditioning Center

  - Days to sale / days supply measures inventory efficiency

  - Vending machines are Carvana''s signature car pickup locations

  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)

  - Q4 earnings calls typically include full-year actuals

  - Company went through major debt restructuring in 2023

  - "Retail GPU" vs "Total GPU" — total includes all profit sources per unit

  '
topic_hints:
- Retail unit volume and year-over-year growth
- GPU per unit breakdown (retail, wholesale, finance, other)
- Adjusted EBITDA and margin trajectory
- SGA per unit leverage and operational efficiency
- ADESA integration and wholesale marketplace
- Inventory management, days to sale, and reconditioning capacity
- Debt reduction and balance sheet improvement
- Customer acquisition cost and marketing efficiency
- Geographic expansion and logistics network
