extraction_context: 'Apollo Global Management is a leading alternative asset manager
  with a large retirement services business (Athene). Key domain knowledge:

  - AUM = Assets Under Management (total assets across all funds/accounts)

  - FRE = Fee-Related Earnings (recurring, high-quality earnings from management fees)

  - SRE = Spread-Related Earnings (from Athene''s retirement services / insurance
  float)

  - PII = Principal Investing Income (more volatile, performance-based)

  - Athene = Apollo''s retirement services platform (annuities, pension risk transfer)

  - Origination = Apollo''s direct lending and capital solutions platform

  - "Yield" strategies = credit-oriented, lower-risk investments

  - "Hybrid" and "Equity" = higher-return strategies

  - Net invested assets vs gross AUM — net is more relevant for fee generation

  - Retirement services net spread = investment income minus cost of funds

  - ADIP = Apollo Debt Investment Platform

  - "Dry powder" = uninvested committed capital

  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)

  - Q4 earnings calls typically include full-year actuals

  '
topic_hints:
- Total AUM growth and inflow trends
- Fee-related earnings and FRE margin
- Spread-related earnings and Athene retirement services
- Origination volume and capital deployment
- Fundraising activity across yield, hybrid, equity strategies
- Retirement services growth (annuity origination, pension risk transfer)
- Credit market conditions and portfolio quality
- Long-term targets (AUM, FRE, SRE growth)
