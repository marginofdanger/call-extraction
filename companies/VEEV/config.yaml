tracked_metrics:
  guidance_for:
    label: "Guidance For"
    section_pattern: "^Quarterly Guidance"
    extract: "section_suffix"
    display: "banner"

  total_revenue:
    label: "Total Revenue"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Total )?Revenue:?\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"

  subscription_revenue:
    label: "Subscription Revenue"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics|subscription)"
    item_pattern: "(?i)^\\*\\*Subscription (Services )?Revenue:?\\*\\*"
    comparison: "text_diff"

  operating_income:
    label: "Non-GAAP Operating Income"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Non.GAAP )?Operating Income:?\\*\\*"
    comparison: "text_diff"

  operating_margin:
    label: "Non-GAAP Operating Margin"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Non.GAAP )?Operating Margin:?\\*\\*"
    comparison: "midpoint_delta"
    midpoint_format: "percentage"

  billings:
    label: "Calculated Billings"
    section_pattern: "(?i)(quarterly guidance|key metrics|billings)"
    item_pattern: "(?i)^\\*\\*(Calculated )?Billings:?\\*\\*"
    comparison: "text_diff"

  remaining_performance_obligations:
    label: "RPO"
    section_pattern: "(?i)(key metrics|rpo|deferred)"
    item_pattern: "(?i)^\\*\\*(Total )?RPO:?\\*\\*"
    comparison: "text_diff"

  eps:
    label: "Non-GAAP EPS"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Non.GAAP )?(Diluted )?EPS:?\\*\\*"
    comparison: "text_diff"

  fcf_margin:
    label: "FCF Margin"
    section_pattern: "(?i)(key metrics|cash flow|full year)"
    item_pattern: "(?i)^\\*\\*(Free )?Cash Flow Margin:?\\*\\*"
    comparison: "text_diff"

new_section_keywords:
  - pattern: "(?i)vault"
    label: "Vault platform developments discussed"
  - pattern: "(?i)data cloud|link"
    label: "Veeva Data Cloud / Link discussed"
  - pattern: "(?i)public benefit"
    label: "Public Benefit Corporation status discussed"
  - pattern: "(?i)actuals"
    label: "Full-year actuals reported this quarter"
  - pattern: "(?i)ai|generative"
    label: "AI / GenAI capabilities discussed"
    first_only: true
    max_quarter_idx: 4
  - pattern: "(?i)salesforce|crm migration"
    label: "CRM migration from Salesforce discussed"

comparison_sections:
  - title: "Revenue Guidance"
    metrics: ["total_revenue", "subscription_revenue"]
    columns: ["Quarter", "Total Revenue", "Subscription Revenue"]

  - title: "Profitability"
    metrics: ["operating_income", "operating_margin"]
    columns: ["Quarter", "Operating Income", "Op Margin"]

  - title: "Billings & RPO"
    metrics: ["billings", "remaining_performance_obligations"]
    columns: ["Quarter", "Billings", "RPO"]

  - title: "EPS & Cash Flow"
    metrics: ["eps", "fcf_margin"]
    columns: ["Quarter", "Non-GAAP EPS", "FCF Margin"]

extraction_context: |
  Veeva Systems is a cloud computing company focused on the life sciences industry. It provides CRM, content management, data, and regulatory solutions to pharmaceutical and biotech companies. Key domain knowledge:
  - Veeva is a Public Benefit Corporation (PBC) — incorporated for public benefit, not just shareholders
  - Vault = Veeva's core content management and application platform for life sciences
  - Vault modules: Vault Clinical, Vault Quality, Vault Regulatory, Vault Safety, Vault RIM, Vault CDMS
  - Veeva CRM = customer relationship management for pharma sales reps (migrating from Salesforce to Vault CRM)
  - Veeva Data Cloud = commercial data (prescriber data, patient data, reference data) — competing with IQVIA
  - Veeva Link = real-time data on key opinion leaders (KOLs), clinical trials, etc.
  - Veeva Compass = patient and prescriber data product
  - Veeva OpenData = physician and healthcare reference data
  - Subscription revenue = recurring SaaS revenue (the key metric)
  - Professional services revenue = implementation and consulting (lower margin)
  - RPO = Remaining Performance Obligations (contracted future revenue)
  - Billings = revenue + change in deferred revenue (proxy for bookings momentum)
  - NRR = Net Revenue Retention (existing customer expansion, not always disclosed)
  - "R&D" and "Development Cloud" refer to clinical trial and regulatory software
  - "Commercial Cloud" refers to CRM, data, and marketing solutions
  - Company is migrating its CRM product off Salesforce platform to Vault CRM
  - Fiscal year ends January 31 (FY2026 = Feb 2025 – Jan 2026)
  - Q4 earnings calls typically include full-year actuals and next-year guidance

topic_hints:
  - "Subscription revenue growth and renewal rates"
  - "Vault platform adoption and new module wins"
  - "CRM migration from Salesforce to Vault CRM timeline and progress"
  - "Veeva Data Cloud / Compass growth vs. IQVIA"
  - "Operating margin trajectory and Rule of 40 performance"
  - "R&D / Development Cloud (clinical, regulatory, safety)"
  - "AI and GenAI capabilities in life sciences"
  - "Customer count growth and large deal activity"
  - "Free cash flow generation and capital allocation"
