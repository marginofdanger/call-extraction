# Tracked metrics define what appears in the key metrics card and comparison tables.
tracked_metrics:
  guidance_for:
    label: "Guidance For"
    section_pattern: "^Quarterly Guidance"
    extract: "section_suffix"
    display: "banner"

  revenue:
    label: "Next-Q Revenue"
    section_pattern: "^Quarterly Guidance"
    item_pattern: "^\\*\\*Net Sales:?\\*\\*|^\\*\\*Revenue:?\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"

  operating_income:
    label: "Next-Q Operating Income"
    section_pattern: "^Quarterly Guidance"
    item_pattern: "(?i)^\\*\\*Operating Income:?\\*\\*"
    comparison: "midpoint_pct"
    midpoint_format: "dollar_billions"

  aws_revenue:
    label: "AWS Revenue"
    section_pattern: "(?i)(aws|segment|actuals)"
    item_pattern: "(?i)^\\*\\*AWS (Segment )?Revenue:?\\*\\*"
    comparison: "text_diff"

  aws_operating_income:
    label: "AWS Operating Income"
    section_pattern: "(?i)(aws|segment|actuals)"
    item_pattern: "(?i)^\\*\\*AWS (Segment )?Operating Income:?\\*\\*"
    comparison: "text_diff"

  advertising_revenue:
    label: "Advertising Revenue"
    section_pattern: "(?i)(advertising|segment|actuals)"
    item_pattern: "(?i)^\\*\\*Advertising (Services )?Revenue:?\\*\\*"
    comparison: "text_diff"

  na_revenue:
    label: "North America Revenue"
    section_pattern: "(?i)(north america|segment|actuals)"
    item_pattern: "(?i)^\\*\\*North America (Segment )?Revenue:?\\*\\*"
    comparison: "text_diff"

  international_revenue:
    label: "International Revenue"
    section_pattern: "(?i)(international|segment|actuals)"
    item_pattern: "(?i)^\\*\\*International (Segment )?Revenue:?\\*\\*"
    comparison: "text_diff"

  fy_capex:
    label: "CapEx"
    section_pattern: "(?i)(full year|capex|capital)"
    item_pattern: "(?i)^\\*\\*CapEx:?\\*\\*|^\\*\\*Capital Expenditures:?\\*\\*"
    comparison: "text_diff"

  fcf:
    label: "Free Cash Flow"
    section_pattern: "(?i)(full year|free cash flow|capital|actuals)"
    item_pattern: "(?i)^\\*\\*Free Cash Flow:?\\*\\*"
    comparison: "text_diff"

  operating_margin:
    label: "Operating Margin"
    section_pattern: "(?i)(actuals|quarterly guidance)"
    item_pattern: "(?i)^\\*\\*Operating Margin:?\\*\\*"
    comparison: "midpoint_delta"
    midpoint_format: "percentage"

# Change detection: patterns for new section detection
new_section_keywords:
  - pattern: "(?i)ai|generative ai|bedrock"
    label: "AI/Generative AI discussion emerges"
    first_only: true
    max_quarter_idx: 8
  - pattern: "(?i)actuals"
    label: "Full-year actuals reported this quarter"
  - pattern: "(?i)tariff"
    label: "Tariff impact discussion added"
  - pattern: "(?i)project kuiper"
    label: "Project Kuiper satellite discussion"
  - pattern: "(?i)grocery|whole foods"
    label: "Grocery/Whole Foods strategy discussed"
  - pattern: "(?i)prime video|advertising.*video"
    label: "Prime Video advertising discussed"
  - pattern: "(?i)healthcare|one medical|amazon pharmacy"
    label: "Healthcare initiative discussed"
  - pattern: "(?i)custom chip|trainium|inferentia|graviton"
    label: "Custom silicon discussed"

# Comparison page configuration
comparison_sections:
  - title: "Quarterly Revenue Guidance"
    metric_key: "revenue"
    columns: ["Quarter", "Net Sales Guidance", "Midpoint", "vs Prior"]

  - title: "Quarterly Operating Income Guidance"
    metric_key: "operating_income"
    columns: ["Quarter", "Operating Income Guidance", "Midpoint", "vs Prior"]

  - title: "AWS Revenue & Profitability"
    metrics: ["aws_revenue", "aws_operating_income"]
    columns: ["Quarter", "AWS Revenue", "AWS Operating Income"]

  - title: "Segment Revenue Split"
    metrics: ["na_revenue", "international_revenue"]
    columns: ["Quarter", "North America Revenue", "International Revenue"]

  - title: "Advertising Revenue"
    metric_key: "advertising_revenue"
    columns: ["Quarter", "Advertising Revenue"]

  - title: "CapEx & Free Cash Flow"
    metrics: ["fy_capex", "fcf"]
    columns: ["Quarter", "CapEx", "Free Cash Flow"]

# Extraction context: domain-specific hints for Claude during extraction
extraction_context: |
  Amazon is a diversified technology company with three reportable segments:
  1. North America: e-commerce, advertising, Prime in US/Canada/Mexico
  2. International: e-commerce, advertising, Prime outside North America
  3. Amazon Web Services (AWS): cloud computing, storage, database, AI/ML services

  Key domain knowledge:
  - Amazon guides on net sales (revenue) and operating income for the next quarter only
  - They do NOT provide full-year guidance
  - Revenue guidance is typically a range (e.g., $154B-$158.5B) that includes FX impact estimates
  - Operating income guidance is also a range (e.g., $13B-$17.5B)
  - AWS is the primary profit driver — its operating margin (30%+) far exceeds retail
  - "Advertising services" is reported as a line item within North America and International segments
  - Third-party seller services revenue reflects marketplace growth
  - Subscription services revenue is primarily Amazon Prime
  - Fulfillment costs and shipping costs are key expense items
  - CapEx includes both technology infrastructure (data centers) and fulfillment/transportation
  - Free Cash Flow = Operating cash flow minus CapEx (including finance leases and principal repayments)
  - "Trailing Twelve Month" (TTM) FCF is commonly referenced
  - FX impact is significant — always note constant-currency growth vs reported growth
  - Q4 includes holiday season (peak retail revenue)
  - Stock-based compensation (SBC) is a major non-cash expense
  - Headcount changes are closely watched (post-2022 layoffs, then stabilization)
  - Custom chips: Graviton (compute), Trainium (AI training), Inferentia (AI inference)
  - Project Kuiper: satellite broadband venture
  - Amazon Bedrock: managed generative AI service on AWS
  - Prime Video introduced ads in early 2024 — new advertising revenue stream

topic_hints:
  - "AWS revenue growth rate and operating margin trajectory"
  - "AI and generative AI demand (Bedrock, SageMaker, custom chips)"
  - "Advertising revenue growth and Prime Video ads"
  - "Operating income by segment (NA, International, AWS)"
  - "CapEx and infrastructure investment (data centers, fulfillment)"
  - "Free cash flow generation and capital allocation"
  - "FX impact on revenue and operating income guidance"
  - "Fulfillment and delivery cost efficiency (regionalization, same-day)"
  - "Third-party seller services and marketplace growth"
  - "Project Kuiper and other moonshot investments"
