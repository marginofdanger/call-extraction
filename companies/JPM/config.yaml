extraction_context: 'JPMorgan Chase is the largest U.S. bank by assets, with major
  business lines across consumer/community banking, corporate/investment banking,
  commercial banking, and asset/wealth management. Key domain knowledge:

  - NII = Net Interest Income (interest earned on loans minus interest paid on deposits)

  - "NII ex. Markets" strips out trading-related NII for a cleaner view

  - NIR = Noninterest Revenue (fees, trading, investment banking, asset management)

  - CET1 = Common Equity Tier 1 capital ratio (key regulatory metric)

  - ROTCE = Return on Tangible Common Equity (key profitability metric)

  - NCO = Net Charge-Offs (loans written off minus recoveries)

  - Provision = forward-looking estimate of credit losses (includes reserve build/release)

  - IB fees = Investment Banking fees (advisory, equity underwriting, debt underwriting)

  - Markets revenue = trading revenue (Fixed Income and Equities)

  - CCB = Consumer & Community Banking

  - CIB = Corporate & Investment Bank

  - CB = Commercial Banking

  - AWM = Asset & Wealth Management

  - "Managed" revenue includes tax-equivalent adjustments

  - Overhead ratio = noninterest expense / managed revenue

  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)

  - Q4 earnings calls typically include full-year actuals

  - JPM typically reports very early in earnings season (first or second Friday)

  '
topic_hints:
- Net interest income outlook and NII ex. Markets guidance
- 'Credit quality: provision, reserves, net charge-offs, delinquencies'
- CET1 capital ratio and capital return (buybacks, dividends)
- Investment banking fees and deal pipeline
- Markets / trading revenue (FICC and Equities)
- Consumer credit trends (card, auto, mortgage)
- Commercial real estate exposure and office portfolio
- Expense guidance and efficiency / overhead ratio
- ROTCE and medium-term return targets
- Economic outlook and recession probability
