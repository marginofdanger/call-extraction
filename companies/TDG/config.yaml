extraction_context: 'TransDigm Group is a leading manufacturer of highly engineered,
  proprietary aerospace components. The company operates a unique business model centered
  on acquiring niche aerospace businesses with proprietary products and significant
  aftermarket exposure. Key domain knowledge:

  - "EBITDA As Defined" = TransDigm''s adjusted EBITDA metric (their primary profitability
  measure)

  - EBITDA margins are exceptionally high (~50%+) due to proprietary product pricing
  power

  - Three end markets: Commercial Aftermarket, Commercial OEM, Defense & Space

  - Commercial Aftermarket = replacement parts and repairs (highest margin, most predictable)

  - Commercial OEM = parts sold to aircraft manufacturers (Boeing, Airbus) for new
  builds

  - Defense & Space = military and space applications

  - "Sole-source" = TransDigm is the only qualified supplier (most of their products)

  - "Proprietary" products = ~90% of revenue comes from proprietary/sole-source products

  - Acquisition strategy = acquire niche aerospace component companies, apply 3 value
  drivers

  - Three value drivers: 1) Improve operations, 2) Generate new product ideas, 3)
  Price appropriately

  - Highly leveraged capital structure (high debt/EBITDA) — common for their model

  - Special dividends = TransDigm periodically returns capital via large special dividends

  - "Organic growth" excludes contribution from recent acquisitions

  - Bookings / book-to-bill ratio can indicate demand trends

  - Commercial air travel recovery post-COVID is a major secular driver

  - OEM production rates (Boeing 737 MAX, Airbus A320neo) directly impact OEM revenue

  - Fiscal year ends September 30 (FY2026 = Oct 2025 – Sep 2026)

  - Q4 (Jul-Sep) earnings calls include full-year actuals and next-year guidance

  '
topic_hints:
- Commercial aftermarket growth driven by air traffic recovery
- EBITDA As Defined margin trends and pricing power
- Acquisition pipeline and recent deal integration
- OEM production rates (Boeing, Airbus) and OEM revenue impact
- Defense & Space revenue trends and government spending
- Organic vs. acquisition-driven revenue growth
- 'Capital allocation: special dividends, debt management, M&A'
- Free cash flow generation and conversion
- Supply chain conditions and operational performance
