  revenue:
    label: Next-Q Revenue
    section_pattern: ^Quarterly Guidance
    item_pattern: ^\*\*Revenue:?\*\*
    comparison: midpoint_pct
    midpoint_format: dollar_billions
  gm:
    label: Next-Q Gross Margin (Non-GAAP)
    section_pattern: ^Quarterly Guidance
    item_pattern: (?i)^\*\*(Non-GAAP )?Gross Margin:?\*\*
    comparison: midpoint_delta
    midpoint_format: percentage
  opex:
    label: Next-Q OpEx (Non-GAAP)
    section_pattern: ^Quarterly Guidance
    item_pattern: (?i)^\*\*(Non-GAAP )?Operating Expenses:?\*\*
    comparison: midpoint_pct
    midpoint_format: dollar_billions
  gaap_gm:
    label: Next-Q Gross Margin (GAAP)
    section_pattern: ^Quarterly Guidance
    item_pattern: (?i)^\*\*GAAP Gross Margin:?\*\*
    comparison: midpoint_delta
    midpoint_format: percentage
  fy_revenue:
    label: FY Revenue Growth
    section_pattern: ^Full Year.*Guidance
    item_pattern: ^\*\*Revenue( growth)?:?\*\*
    comparison: text_diff
  capex:
    label: CapEx
    section_pattern: ^Full Year.*Guidance
    item_pattern: ^\*\*CapEx:?\*\*
    comparison: text_diff
  dc_revenue:
    label: Data Center Revenue
    section_pattern: (?i)(segment|data center|platform)
    item_pattern: (?i)data center
    comparison: text_diff
  gaming_revenue:
    label: Gaming Revenue
    section_pattern: (?i)(segment|gaming|platform)
    item_pattern: (?i)gaming
    comparison: text_diff
  lt_gm:
    label: LT Gross Margin Target
    section_pattern: ^Long-Term
    item_pattern: ^\*\*Gross Margin:?\*\*
    comparison: text_diff
  lt_cagr:
    label: LT Revenue CAGR
    section_pattern: ^Long-Term
    item_pattern: ^\*\*Revenue CAGR:?\*\*
    comparison: text_diff
