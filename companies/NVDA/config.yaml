extraction_context: 'NVIDIA is a semiconductor company focused on GPUs and accelerated
  computing. Key domain knowledge:

  - GPU architectures: Hopper (H100, H200), Blackwell (B100, B200, GB200), Ada Lovelace
  (consumer GeForce RTX 40-series), Ampere (prior gen A100)

  - Segments: Data Center, Gaming, Professional Visualization, Automotive/Robotics,
  OEM & Other

  - Data Center is the primary growth driver (AI/ML training and inference)

  - GAAP vs Non-GAAP: Non-GAAP excludes stock-based compensation and acquisition-related
  costs

  - Revenue is reported in USD (billions)

  - GM = Gross Margin, OM = Operating Margin, OpEx = Operating Expenses

  - CapEx includes property/equipment and cloud compute commitments

  - DGX = AI supercomputer systems, HGX = GPU server boards

  - NVLink = GPU-to-GPU interconnect, NVSwitch = network switch for GPU clusters

  - InfiniBand = high-speed networking (Mellanox acquisition), transitioning to Spectrum-X
  Ethernet

  - Grace = ARM-based data center CPU (Grace Hopper, Grace Blackwell superchips)

  - CUDA = parallel computing platform and programming model

  - NIMS = NVIDIA Inference Microservices

  - Sovereign AI = national/government AI infrastructure initiatives

  - Fiscal year ends late January (FY2025 = Feb 2024 - Jan 2025)

  - Q4 earnings calls include full fiscal year actuals

  - Revenue guidance given as a range (e.g., $24.0B +/- 2%)

  '
topic_hints:
- GPU architecture roadmap (Hopper, Blackwell, next-gen)
- Data Center revenue and AI demand trajectory
- Gaming segment recovery and Ada Lovelace cycle
- Gross margin trajectory (product mix, new architecture ramps)
- Supply chain and CoWoS/HBM capacity constraints
- Networking revenue (InfiniBand vs Spectrum-X transition)
- Sovereign AI and geographic revenue mix
- Automotive/Robotics (DRIVE platform, autonomous vehicles)
- CapEx and infrastructure investment
- China export restrictions and regulatory impact
