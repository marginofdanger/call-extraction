new_section_keywords:
  - pattern: "(?i)mattress firm"
    label: "Mattress Firm acquisition / integration discussed"
  - pattern: "(?i)somnigroup"
    label: "Somnigroup rebranding discussed"
  - pattern: "(?i)synerg"
    label: "Acquisition synergies quantified"
  - pattern: "(?i)actuals"
    label: "Full-year actuals reported this quarter"
  - pattern: "(?i)dtc|direct.to.consumer"
    label: "DTC / e-commerce channel discussed"
  - pattern: "(?i)commodity|raw material"
    label: "Commodity / raw material cost impact discussed"

comparison_sections:
  - title: "Revenue & EPS Guidance"
    metrics: ["revenue", "adjusted_eps"]
    columns: ["Quarter", "Revenue", "Adjusted EPS"]

  - title: "Profitability"
    metrics: ["adjusted_ebitda", "adjusted_ebitda_margin", "gross_margin"]
    columns: ["Quarter", "Adj EBITDA", "EBITDA Margin", "Gross Margin"]

  - title: "Segment Revenue"
    metrics: ["north_america_revenue", "international_revenue", "mattress_firm_revenue"]
    columns: ["Quarter", "North America", "International", "Mattress Firm"]

  - title: "Retail Metrics"
    metric_key: "same_store_sales"
    columns: ["Quarter", "Same-Store Sales"]

extraction_context: |
  Somnigroup International (formerly Tempur Sealy International, rebranded February 2025) is the world's largest bedding company. It designs, manufactures, distributes, and retails mattresses and sleep products. Key domain knowledge:
  - Company changed name from Tempur Sealy to Somnigroup International in Feb 2025
  - Ticker changed from TPX to SGI in Feb 2025
  - Acquired Mattress Firm (largest U.S. mattress retailer) for ~$5B, closed late 2024/early 2025
  - Key brands: Tempur-Pedic (premium), Sealy (mid-market), Stearns & Foster (luxury)
  - Retail brands: Mattress Firm, Dreams (UK), Sleep Outfitters, SOVA
  - "North America" segment = wholesale + DTC in US/Canada
  - "International" segment = operations outside North America
  - DTC = Direct-to-Consumer (online and owned retail stores)
  - Wholesale = sales through third-party retailers
  - Same-store sales = comparable sales at retail locations open 12+ months
  - Adjusted EBITDA is the key profitability metric management emphasizes
  - Commodity costs (foam chemicals, steel) significantly impact margins
  - "Bedding industry" is cyclical, tied to housing and consumer confidence
  - Pro forma combined revenue (Tempur Sealy + Mattress Firm) ~$8B annually
  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)
  - Q4 earnings calls typically include full-year actuals

topic_hints:
  - "Mattress Firm acquisition integration and synergy realization"
  - "Revenue by segment (North America, International, Mattress Firm retail)"
  - "Adjusted EBITDA margin trends and commodity cost impact"
  - "Same-store sales and retail comparable performance"
  - "Brand performance (Tempur-Pedic, Sealy, Stearns & Foster)"
  - "DTC / e-commerce growth and channel mix"
  - "International expansion (Dreams UK, global distribution)"
  - "Debt reduction and leverage targets post-acquisition"
  - "Bedding industry demand trends and housing cycle"
