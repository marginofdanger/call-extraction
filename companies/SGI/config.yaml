tracked_metrics:
  guidance_for:
    label: "Guidance For"
    section_pattern: "^Quarterly Guidance"
    extract: "section_suffix"
    display: "banner"

  revenue:
    label: "Revenue"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*(Total |Net )?Revenue:?\\*\\*"
    comparison: "text_diff"

  adjusted_ebitda:
    label: "Adjusted EBITDA"
    section_pattern: "(?i)(quarterly guidance|full year|key metrics)"
    item_pattern: "(?i)^\\*\\*Adjusted EBITDA:?\\*\\*"
    comparison: "text_diff"

  adjusted_ebitda_margin:
    label: "Adjusted EBITDA Margin"
    section_pattern: "(?i)(quarterly guidance|key metrics)"
    item_pattern: "(?i)^\\*\\*Adjusted EBITDA Margin:?\\*\\*"
