extraction_context: 'AppLovin is an internet advertising technology company with two
  segments: Software Platform (advertising) and Apps (mobile games). Key domain knowledge:

  - Software Platform = AppLovin''s advertising technology (AppDiscovery, MAX, SparkLabs,
  Wurl)

  - AppDiscovery = AI-powered advertising engine for mobile app install campaigns

  - MAX = in-app mediation platform (helps publishers monetize via ads)

  - AXON = AppLovin''s proprietary AI/ML engine powering ad recommendations

  - AXON 2.0 = major AI engine upgrade that dramatically improved ad performance

  - Apps segment = portfolio of mobile games (declining/divesting)

  - Software Platform is the high-margin growth driver (~70-80%+ margins)

  - Apps segment has much lower margins and is being de-emphasized

  - "E-commerce" expansion = extending ad platform beyond mobile gaming to web/e-commerce
  advertisers

  - ROAS = Return on Ad Spend (key metric for advertisers)

  - IAP = In-App Purchases

  - DAU = Daily Active Users

  - ARPDAU = Average Revenue Per Daily Active User

  - Company has been aggressively buying back stock and reducing debt

  - Fiscal year = calendar year (Q1=Jan-Mar, Q4=Oct-Dec)

  - Q4 earnings calls typically include full-year actuals

  - AppLovin''s growth story is driven by AI improvements to ad targeting

  '
topic_hints:
- Software Platform revenue growth and margin expansion
- AXON AI engine improvements and ad performance
- E-commerce and web advertising TAM expansion
- Apps segment performance and potential divestiture
- Adjusted EBITDA and free cash flow generation
- Advertiser adoption and customer diversification beyond gaming
- MAX mediation platform growth and publisher adoption
- Capital allocation (buybacks, debt reduction)
- Connected TV and new advertising verticals
